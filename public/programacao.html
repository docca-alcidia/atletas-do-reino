<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atletas do Reino — Programação</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="padding-bottom:32px;">

    <!-- Header -->
    <div class="prog-header">
      <div class="badge" id="faseBadge">FASE DE BASE · SEMANA 1</div>
      <h2 id="semanaTitulo">Semana de Treinos</h2>
      <div class="atleta-nome" id="atletaNome"></div>
    </div>

    <div class="phase-bar">
      <div class="fill" id="phaseFill" style="width:25%"></div>
    </div>

    <!-- Days navigation -->
    <div class="days-nav" id="daysNav">
      <!-- Generated by JS -->
    </div>

    <!-- Level selector -->
    <div class="level-selector">
      <button class="level-btn" data-level="iniciante">Iniciante</button>
      <button class="level-btn active" data-level="avancado">Avançado</button>
      <button class="level-btn" data-level="rx">RX</button>
    </div>

    <!-- View toggle -->
    <div class="view-toggle" id="viewToggle">
      <span class="icon">&#9776;</span>
      <span>Visão semanal</span>
    </div>

    <!-- Weekly view -->
    <div class="week-view" id="weekView">
      <!-- Generated by JS -->
    </div>

    <!-- Day detail view -->
    <div class="day-detail show" id="dayDetail">
      <!-- Generated by JS -->
    </div>

    <!-- Day navigation arrows -->
    <div class="day-nav" id="dayNav">
      <button class="nav-arrow" id="prevDay">&#8592; Anterior</button>
      <button class="nav-arrow" id="nextDay">Próximo &#8594;</button>
    </div>
  </div>

  <!-- Result modal -->
  <div class="modal-overlay" id="resultModal">
    <div class="modal">
      <h3>Registrar Resultado</h3>
      <div class="field">
        <label>Seu resultado</label>
        <textarea id="resultText" placeholder="Ex: 12:35 / 5 rounds + 3 reps / 85kg PR"></textarea>
      </div>
      <div class="field">
        <label>Observações</label>
        <textarea id="resultObs" placeholder="Como se sentiu? Algo a melhorar?"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="cancelResult">Cancelar</button>
        <button class="btn btn-primary" id="saveResult">Salvar</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/programacao.js"></script>
</body>
</html>
