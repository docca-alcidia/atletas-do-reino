<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atletas do Reino — Entrar</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      color: var(--dourado);
      margin-bottom: 4px;
    }
    .auth-logo .slogan {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      color: var(--cinza-escuro);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--azul-card);
      border: 1px solid rgba(160,186,214,0.1);
      border-radius: 16px;
      padding: 28px 24px;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      background: var(--azul-claro);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--cinza);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: var(--azul-card);
      color: var(--dourado);
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: var(--branco);
      margin-bottom: 6px;
    }
    .auth-subtitle {
      font-size: 0.85rem;
      color: var(--cinza);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .auth-field {
      margin-bottom: 16px;
    }
    .auth-field label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      color: var(--cinza);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .auth-field input {
      width: 100%;
      padding: 12px 14px;
      background: var(--azul);
      border: 1px solid rgba(160,186,214,0.2);
      border-radius: 10px;
      color: var(--branco);
      font-size: 0.95rem;
      font-family: 'Barlow', sans-serif;
      transition: border-color 0.2s;
    }
    .auth-field input:focus {
      outline: none;
      border-color: var(--dourado);
    }
    .auth-field input::placeholder { color: var(--cinza-escuro); }
    .btn-auth {
      width: 100%;
      padding: 14px;
      background: var(--dourado);
      border: none;
      border-radius: 10px;
      color: var(--azul);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    .btn-auth:hover { opacity: 0.9; }
    .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: #f87171;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-success {
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--verde);
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .divider {
      text-align: center;
      color: var(--cinza-escuro);
      font-size: 0.8rem;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(160,186,214,0.15);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .senha-hint {
      font-size: 0.78rem;
      color: var(--cinza-escuro);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>Atletas do Reino</h1>
      <div class="slogan">Do Reino para a Glória</div>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="setTab('login')">Entrar</button>
        <button class="auth-tab" onclick="setTab('criar')">Criar Conta</button>
      </div>

      <!-- LOGIN -->
      <div class="auth-form active" id="formLogin">
        <div class="auth-title">Bem-vindo de volta</div>
        <div class="auth-subtitle">Entre com seu email e senha para acessar sua programação.</div>
        <div class="auth-error" id="loginErro"></div>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Senha</label>
          <input type="password" id="loginSenha" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-auth" id="btnLogin" onclick="fazerLogin()">Entrar</button>
      </div>

      <!-- CRIAR CONTA -->
      <div class="auth-form" id="formCriar">
        <div class="auth-title">Comece sua jornada</div>
        <div class="auth-subtitle">Crie sua conta e receba uma programação personalizada com IA.</div>
        <div class="auth-error" id="criarErro"></div>
        <div class="auth-success" id="criarSucesso"></div>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="criarEmail" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="auth-field">
          <label>Senha</label>
          <input type="password" id="criarSenha" placeholder="mínimo 6 caracteres" autocomplete="new-password">
          <div class="senha-hint">Use pelo menos 6 caracteres</div>
        </div>
        <div class="auth-field">
          <label>Confirmar Senha</label>
          <input type="password" id="criarSenhaConf" placeholder="repita a senha" autocomplete="new-password">
        </div>
        <button class="btn-auth" id="btnCriar" onclick="criarConta()">Criar Conta</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    // Se já tem token válido, redireciona direto
    const token = localStorage.getItem('adr_token');
    const atletaId = localStorage.getItem('atletaId');
    if (token && atletaId) {
      window.location.href = '/programacao.html';
    }

    function setTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('formLogin').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('formCriar').classList.add('active');
      }
    }

    function showErro(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }
    function hideErro(id) { document.getElementById(id).style.display = 'none'; }
    function showSucesso(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }

    // Enter key para submeter
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const formLogin = document.getElementById('formLogin');
        if (formLogin.classList.contains('active')) fazerLogin();
        else criarConta();
      }
    });

    async function fazerLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const senha = document.getElementById('loginSenha').value;
      hideErro('loginErro');

      if (!email || !senha) return showErro('loginErro', 'Preencha email e senha.');

      const btn = document.getElementById('btnLogin');
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();

        if (!res.ok) {
          showErro('loginErro', data.erro || 'Erro ao fazer login.');
          btn.disabled = false;
          btn.textContent = 'Entrar';
          return;
        }

        localStorage.setItem('adr_token', data.token);
        localStorage.setItem('atletaId', data.atleta_id);
        localStorage.setItem('atletaNome', data.nome || email.split('@')[0]);

        if (!data.perfil_completo) {
          window.location.href = '/index.html';
        } else {
          window.location.href = '/programacao.html';
        }
      } catch (err) {
        showErro('loginErro', 'Erro de conexão. Tente novamente.');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    async function criarConta() {
      const email = document.getElementById('criarEmail').value.trim();
      const senha = document.getElementById('criarSenha').value;
      const conf = document.getElementById('criarSenhaConf').value;
      hideErro('criarErro');

      if (!email || !senha) return showErro('criarErro', 'Preencha todos os campos.');
      if (senha.length < 6) return showErro('criarErro', 'A senha deve ter pelo menos 6 caracteres.');
      if (senha !== conf) return showErro('criarErro', 'As senhas não coincidem.');

      const btn = document.getElementById('btnCriar');
      btn.disabled = true;
      btn.textContent = 'Criando conta...';

      try {
        const res = await fetch(`${API_BASE}/api/auth/registrar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();

        if (!res.ok) {
          showErro('criarErro', data.erro || 'Erro ao criar conta.');
          btn.disabled = false;
          btn.textContent = 'Criar Conta';
          return;
        }

        localStorage.setItem('adr_token', data.token);
        localStorage.setItem('atletaId', data.atleta_id);
        localStorage.setItem('atletaNome', email.split('@')[0]);

        showSucesso('criarSucesso', 'Conta criada! Redirecionando para o onboarding...');
        setTimeout(() => { window.location.href = '/index.html'; }, 1200);
      } catch (err) {
        showErro('criarErro', 'Erro de conexão. Tente novamente.');
        btn.disabled = false;
        btn.textContent = 'Criar Conta';
      }
    }
  </script>
</body>
</html>
